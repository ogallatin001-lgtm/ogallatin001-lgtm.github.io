<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Speed Test</title>
    <style>
        /* Inlined CSS for Reaction Speed Game */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #e5e5f7;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        #message {
            font-size: 2em;
            padding: 20px;
            text-align: center;
        }

        #results {
            font-size: 1.5em;
            color: #ff79c6;
            margin-top: 20px;
        }

        /* Home button styling - important: the path is adjusted for nested directory */
        .home-button {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 15px;
            text-decoration: none;
            background-color: #44475a;
            color: #e5e5f7;
            border-radius: 5px;
            z-index: 10;
            transition: background-color 0.2s;
        }

        .home-button:hover {
            background-color: #6272a4;
        }
    </style>
</head>
<body id="game-area">
    <div id="message">Click to start the test!</div>
    <div id="results" style="display: none;"></div>
    <a href="../../index.html" class="home-button">← Back to Hub</a>
    
    <script>
        // Inlined JavaScript for Reaction Speed Game
        const gameArea = document.getElementById('game-area');
        const messageDiv = document.getElementById('message');
        const resultsDiv = document.getElementById('results');

        let startTime = 0;
        let timeoutID = null;
        let state = 'waiting'; // 'waiting', 'ready', 'test'

        gameArea.addEventListener('click', handleGameClick);

        function handleGameClick() {
            if (state === 'waiting') {
                // Start phase: Set background to red and schedule the change
                state = 'ready';
                gameArea.style.backgroundColor = '#ff5555'; // Red
                messageDiv.textContent = 'Wait for GREEN...';
                resultsDiv.textContent = '';
                
                // Random time between 2 and 5 seconds
                const delay = Math.random() * 3000 + 2000; 
                
                timeoutID = setTimeout(() => {
                    // Test phase: Change to green
                    state = 'test';
                    gameArea.style.backgroundColor = '#50fa7b'; // Green
                    messageDiv.textContent = 'CLICK NOW!';
                    startTime = new Date().getTime();
                }, delay);
                
            } else if (state === 'ready') {
                // Clicked too soon (while red)
                clearTimeout(timeoutID);
                state = 'waiting';
                gameArea.style.backgroundColor = '#1a1a2e';
                messageDiv.textContent = 'Too soon! You clicked while it was RED. Click to restart.';
                resultsDiv.textContent = '';

            } else if (state === 'test') {
                // Clicked while green
                const endTime = new Date().getTime();
                const reactionTime = endTime - startTime;
                state = 'waiting';
                gameArea.style.backgroundColor = '#1a1a2e';
                messageDiv.textContent = `Your time: ${reactionTime} ms! Click to play again.`;
                resultsDiv.textContent = '';
            }
        }
    </script>
</body>
</html>
